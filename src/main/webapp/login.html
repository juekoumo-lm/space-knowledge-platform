<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 航天知识闯关学习平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            max-width: 400px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 12px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .login-card:hover { 
            box-shadow: 0 12px 40px rgba(61, 90, 128, 0.3);
            transform: translateY(-2px);
        }
        .btn-primary { 
            background: #3d5a80; 
            border: none; 
            transition: all 0.3s ease;
        }
        .btn-primary:hover { 
            background: #4a6fa5; 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.4);
        }
        .form-control { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: #e0e1dd;
        }
        .form-control:focus { 
            background: rgba(255,255,255,0.15); 
            border-color: #4a6fa5; 
            box-shadow: 0 0 0 0.2rem rgba(74, 111, 165, 0.25);
        }
        .form-label { 
            color: #adb5bd; 
        }
        h4 { 
            color: #e0e1dd; 
            font-weight: 600;
        }
        a { 
            color: #4a6fa5; 
            transition: color 0.3s ease;
        }
        a:hover { 
            color: #98c1d9; 
        }
    </style>
</head>
<body>
    <div class="login-card p-4 w-100">
        <h4 class="text-center mb-4">登录</h4>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <div class="alert alert-danger d-none" id="errMsg"></div>
            <div class="alert alert-success d-none" id="successMsg"></div>
            <button type="submit" class="btn btn-primary w-100">登录</button>
        </form>
        <p class="mt-3 text-center text-muted small"><a href="index.html" class="text-light">返回首页</a> | <a href="register.html" class="text-light">注册</a></p>
    </div>
    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            const API_BASE = window.location.origin + '/space-knowledge/api';
            
            // 显示错误信息
            function showError(message) {
                const errMsg = document.getElementById('errMsg');
                const successMsg = document.getElementById('successMsg');
                errMsg.textContent = message;
                errMsg.classList.remove('d-none');
                successMsg.classList.add('d-none');
            }
            
            // 显示成功信息
            function showSuccess(message) {
                const errMsg = document.getElementById('errMsg');
                const successMsg = document.getElementById('successMsg');
                successMsg.textContent = message;
                successMsg.classList.remove('d-none');
                errMsg.classList.add('d-none');
            }
            
            // 登录表单提交
            document.getElementById('loginForm').onsubmit = async function(e) {
                e.preventDefault();
                const form = this;
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                
                // 禁用按钮防止重复提交
                submitBtn.disabled = true;
                submitBtn.textContent = '登录中...';
                
                const fd = new FormData(form);
                const username = fd.get('username');
                const password = fd.get('password');
                
                if (!username || !password) {
                    showError('用户名和密码不能为空');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                
                try {
                    const res = await fetch(API_BASE + '/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username, password: password })
                    });
                    
                    if (!res.ok) {
                        showError('网络错误，请稍后重试');
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                        return;
                    }
                    
                    const data = await res.json();
                    console.log('登录响应:', data);
                    
                    if (data.code === 200) {
                        showSuccess('登录成功，正在跳转...');
                        localStorage.setItem('token', data.data.token);
                        localStorage.setItem('user', JSON.stringify(data.data.user));
                        const roleId = data.data.user.roleId;
                        
                        // 延迟跳转，让用户看到成功提示
                        setTimeout(() => {
                            if (roleId === 1) {
                                location.href = 'student/index.html';
                            } else if (roleId === 2 || roleId === 3) {
                                location.href = 'teacher/dashboard.html';
                            } else {
                                location.href = 'index.html';
                            }
                        }, 1000);
                    } else {
                        showError(data.message || '登录失败');
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                    }
                } catch (err) {
                    console.error('登录错误:', err);
                    showError('网络错误，请稍后重试');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            };
            
            // 添加表单输入验证和反馈
            const usernameInput = document.querySelector('input[name="username"]');
            const passwordInput = document.querySelector('input[name="password"]');
            
            usernameInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('is-invalid');
                }
            });
            
            passwordInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('is-invalid');
                }
            });
        });
    </script>
</body>
</html>
