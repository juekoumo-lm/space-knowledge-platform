<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>错题本 - 航天知识闯关</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1b263b; color: #e0e1dd; }
        .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">← 返回</a>
            <span>错题本</span>
        </div>
    </nav>
    <div class="container py-4">
        <div id="list"></div>
    </div>
    <script>
        const API_BASE = window.location.origin + '/space-knowledge/api';
        const token = localStorage.getItem('token');
        if (!token) location.href = '../login.html';

        fetch(API_BASE + '/student/wrong?page=1&size=50', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.json()).then(d => {
                if (d.code !== 200 || !d.data || !d.data.length) {
                    document.getElementById('list').innerHTML = '<div class="card p-3">暂无错题</div>';
                    return;
                }
                document.getElementById('list').innerHTML = d.data.map(w => {
                    const content = (w.question && w.question.content) ? w.question.content.substring(0, 80) + '…' : '';
                    return `<div class="card p-3 mb-2"><p>${content}</p><a href="practice.html?qid=${w.questionId}" class="btn btn-sm btn-outline-light">再做一次</a></div>`;
                }).join('');
            });
    </script>
</body>
</html>
