<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>闯关 - 航天知识闯关</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1b263b; color: #e0e1dd; }
        .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">← 返回</a>
            <span id="levelTitle">关卡</span>
        </div>
    </nav>
    <div class="container py-4">
        <div class="card p-4" id="questionCard">
            <p class="text-muted">加载中…</p>
        </div>
        <div class="mt-3" id="progressText"></div>
        <div class="mt-3">
            <button class="btn btn-primary" id="btnNext" style="display:none">下一题</button>
            <button class="btn btn-success" id="btnSubmit" style="display:none">提交闯关</button>
        </div>
    </div>
    <script>
        const API_BASE = window.location.origin + '/space-knowledge/api';
        const token = localStorage.getItem('token');
        if (!token) location.href = '../login.html';
        const params = new URLSearchParams(location.search);
        const levelId = params.get('id');
        if (!levelId) { location.href = 'index.html'; }

        let questions = [], currentIdx = 0, correctCount = 0;
        fetch(API_BASE + '/student/level/' + levelId + '/questions', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.json()).then(d => {
                if (d.code === 200 && d.data) {
                    questions = d.data;
                    document.getElementById('levelTitle').textContent = '关卡 ' + levelId;
                    renderQuestion();
                } else document.getElementById('questionCard').innerHTML = '<p class="text-danger">加载失败</p>';
            });

        function renderQuestion() {
            const q = questions[currentIdx];
            if (!q) { document.getElementById('questionCard').innerHTML = '<p>暂无题目</p>'; return; }
            document.getElementById('progressText').textContent = `第 ${currentIdx + 1} / ${questions.length} 题`;
            let html = '<h5>' + (q.content || '') + '</h5>';
            
            if (q.options && q.options.length) {
                const inputType = q.type === 'MULTIPLE' ? 'checkbox' : 'radio';
                q.options.forEach(opt => {
                    html += `<div class="form-check"><input class="form-check-input" type="${inputType}" name="answer" value="${opt.optionLabel}" id="o${opt.id}"><label class="form-check-label" for="o${opt.id}">${opt.optionLabel}. ${opt.optionText}</label></div>`;
                });
            } else if (q.type === 'JUDGE') {
                html += `<div class="form-check"><input class="form-check-input" type="radio" name="answer" value="A"><label class="form-check-label">A. 正确</label></div>`;
                html += `<div class="form-check"><input class="form-check-input" type="radio" name="answer" value="B"><label class="form-check-label">B. 错误</label></div>`;
            } else if (q.type === 'FILL') {
                html += `<input type="text" class="form-control" name="answer" placeholder="请输入答案">`;
            } else if (q.type === 'SUBJECTIVE') {
                html += `<textarea class="form-control" name="answer" rows="3" placeholder="请输入答案"></textarea>`;
            }
            
            document.getElementById('questionCard').innerHTML = html;
            document.getElementById('btnNext').style.display = currentIdx < questions.length - 1 ? 'inline-block' : 'none';
            document.getElementById('btnSubmit').style.display = currentIdx === questions.length - 1 && questions.length ? 'inline-block' : 'none';
        }

        function submitCurrentAnswer(callback) {
            const q = questions[currentIdx];
            if (!q) { 
                if (callback) callback(); 
                return; 
            }
            
            let answer = '';
            if (q.type === 'MULTIPLE') {
                const selected = [...document.querySelectorAll('input[name=answer]:checked')].map(x => x.value).join(',');
                answer = selected;
            } else if (q.type === 'SINGLE' || q.type === 'JUDGE') {
                const sel = document.querySelector('input[name=answer]:checked');
                answer = sel ? sel.value : '';
            } else if (q.type === 'FILL') {
                const input = document.querySelector('input[name=answer]');
                answer = input ? input.value : '';
            } else if (q.type === 'SUBJECTIVE') {
                const textarea = document.querySelector('textarea[name=answer]');
                answer = textarea ? textarea.value : '';
            }
            
            fetch(API_BASE + '/student/answer', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ questionId: q.id, levelId: parseInt(levelId), answer: answer, timeSpent: 0, source: 'level' })
            }).then(r => r.json()).then(d => {
                if (d.code === 200 && d.data && d.data.correct) correctCount++;
                if (callback) callback();
            });
        }

        document.getElementById('btnNext').onclick = function() {
            submitCurrentAnswer(function() {
                currentIdx++;
                renderQuestion();
            });
        };

        document.getElementById('btnSubmit').onclick = function() {
            submitCurrentAnswer(function() {
                const score = questions.length ? Math.round((correctCount / questions.length) * 100) : 0;
                fetch(API_BASE + '/student/level/' + levelId + '/complete', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ score: score, passed: score >= 60, timeSpent: 0 })
                }).then(() => { alert('闯关完成！得分：' + score); location.href = 'index.html'; });
            });
        };
    </script>
</body>
</html>
