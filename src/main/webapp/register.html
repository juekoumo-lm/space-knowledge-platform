<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注册 - 航天知识闯关学习平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1rem; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .reg-card { 
            max-width: 420px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 12px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .reg-card:hover { 
            box-shadow: 0 12px 40px rgba(61, 90, 128, 0.3);
            transform: translateY(-2px);
        }
        .btn-primary { 
            background: #3d5a80; 
            border: none; 
            transition: all 0.3s ease;
        }
        .btn-primary:hover { 
            background: #4a6fa5; 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.4);
        }
        .form-control, .form-select { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: #e0e1dd;
        }
        .form-control:focus, .form-select:focus { 
            background: rgba(255,255,255,0.15); 
            border-color: #4a6fa5; 
            box-shadow: 0 0 0 0.2rem rgba(74, 111, 165, 0.25);
        }
        .form-label { 
            color: #adb5bd; 
        }
        h4 { 
            color: #e0e1dd; 
            font-weight: 600;
        }
        a { 
            color: #4a6fa5; 
            transition: color 0.3s ease;
        }
        a:hover { 
            color: #98c1d9; 
        }
    </style>
</head>
<body>
    <div class="reg-card p-4 w-100">
        <h4 class="text-center mb-4">注册</h4>
        <form id="regForm">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">真实姓名</label>
                <input type="text" class="form-control" name="realName">
            </div>
            <div class="mb-3">
                <label class="form-label">角色</label>
                <select class="form-select" name="roleId" id="roleId">
                    <option value="1">学生</option>
                    <option value="2">教师</option>
                </select>
            </div>
            <div class="mb-3" id="gradeWrap">
                <label class="form-label">年级</label>
                <select class="form-select" name="gradeId" id="gradeId">
                    <option value="">请选择</option>
                </select>
            </div>
            <div class="alert alert-danger d-none" id="errMsg"></div>
            <div class="alert alert-success d-none" id="successMsg"></div>
            <button type="submit" class="btn btn-primary w-100">注册</button>
        </form>
        <p class="mt-3 text-center text-muted small"><a href="login.html" class="text-light">去登录</a></p>
    </div>
    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            const API_BASE = window.location.origin + '/space-knowledge/api';
            
            // 加载年级数据
            fetch(API_BASE + '/grades').then(r => {
                if (!r.ok) {
                    console.error('年级数据加载失败:', r.status, r.statusText);
                    document.getElementById('gradeId').innerHTML += `<option value="">加载失败</option>`;
                    return { code: 500, data: null };
                }
                return r.json();
            }).then(d => {
                console.log('年级数据:', d);
                if (d.code === 200 && d.data) {
                    d.data.forEach(g => {
                        document.getElementById('gradeId').innerHTML += `<option value="${g.id}">${g.name}</option>`;
                    });
                } else {
                    document.getElementById('gradeId').innerHTML += `<option value="">无数据</option>`;
                }
            }).catch(err => {
                console.error('年级数据加载错误:', err);
                document.getElementById('gradeId').innerHTML += `<option value="">加载失败</option>`;
            });
            
            // 角色切换逻辑
            const roleSelect = document.getElementById('roleId');
            const gradeWrap = document.getElementById('gradeWrap');
            
            roleSelect.addEventListener('change', function() {
                console.log('角色切换:', this.value);
                if (this.value === '2') {
                    // 教师角色隐藏年级选项
                    gradeWrap.style.display = 'none';
                    document.getElementById('gradeId').value = '';
                } else {
                    // 学生角色显示年级选项
                    gradeWrap.style.display = 'block';
                }
            });
            
            // 初始检查角色
            roleSelect.dispatchEvent(new Event('change'));
            
            // 显示错误信息
            function showError(message) {
                const errMsg = document.getElementById('errMsg');
                const successMsg = document.getElementById('successMsg');
                errMsg.textContent = message;
                errMsg.classList.remove('d-none');
                successMsg.classList.add('d-none');
            }
            
            // 显示成功信息
            function showSuccess(message) {
                const errMsg = document.getElementById('errMsg');
                const successMsg = document.getElementById('successMsg');
                successMsg.textContent = message;
                successMsg.classList.remove('d-none');
                errMsg.classList.add('d-none');
            }
            
            // 注册表单提交
            document.getElementById('regForm').onsubmit = async function(e) {
                e.preventDefault();
                const form = this;
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                
                // 禁用按钮防止重复提交
                submitBtn.disabled = true;
                submitBtn.textContent = '注册中...';
                
                const fd = new FormData(form);
                const username = fd.get('username');
                const password = fd.get('password');
                const roleId = parseInt(fd.get('roleId'));
                
                if (!username || !password) {
                    showError('用户名和密码不能为空');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                
                if (roleId === 1 && !fd.get('gradeId')) {
                    showError('学生角色必须选择年级');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                
                const body = {
                    username: username,
                    password: password,
                    realName: fd.get('realName') || null,
                    roleId: roleId,
                    gradeId: (roleId === 1 && fd.get('gradeId')) ? parseInt(fd.get('gradeId')) : null
                };
                
                console.log('注册请求:', body);
                
                try {
                    const res = await fetch(API_BASE + '/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (!res.ok) {
                        showError('网络错误，请稍后重试');
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                        return;
                    }
                    
                    const data = await res.json();
                    console.log('注册响应:', data);
                    
                    if (data.code === 200) {
                        showSuccess('注册成功，正在跳转...');
                        localStorage.setItem('token', data.data.token);
                        localStorage.setItem('user', JSON.stringify(data.data.user));
                        
                        // 延迟跳转，让用户看到成功提示
                        setTimeout(() => {
                            if (data.data.user.roleId === 1) {
                                location.href = 'student/index.html';
                            } else {
                                location.href = 'teacher/dashboard.html';
                            }
                        }, 1000);
                    } else {
                        showError(data.message || '注册失败');
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                    }
                } catch (err) {
                    console.error('注册错误:', err);
                    showError('网络错误，请稍后重试');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            };
            
            // 添加表单输入验证和反馈
            const usernameInput = document.querySelector('input[name="username"]');
            const passwordInput = document.querySelector('input[name="password"]');
            const gradeSelect = document.getElementById('gradeId');
            
            usernameInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('is-invalid');
                }
            });
            
            passwordInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('is-invalid');
                }
            });
            
            gradeSelect.addEventListener('change', function() {
                if (this.value) {
                    this.classList.remove('is-invalid');
                }
            });
        });
    </script>
</body>
</html>
