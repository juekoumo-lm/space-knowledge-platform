<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>航天知识闯关学习平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%); min-height: 100vh; color: #e0e1dd; }
        .hero { padding: 4rem 0; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
        .btn-primary { background: #3d5a80; border-color: #3d5a80; }
        .btn-primary:hover { background: #4a6fa5; border-color: #4a6fa5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>航天知识闯关学习平台</h1>
            <p class="lead">按年级分层 · 闯关式学习 · 智能推荐 · 学情可视化</p>
            <div class="mt-4">
                <a href="login.html" class="btn btn-primary btn-lg me-2">登录</a>
                <a href="register.html" class="btn btn-outline-light btn-lg">注册</a>
            </div>
        </div>
        <div class="row g-3 mt-2">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>学生端</h5>
                    <p class="mb-0">分年级关卡、智能推荐、错题本、勋章成就、学习报告</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>教师端</h5>
                    <p class="mb-0">题库管理、Excel 批量导入、布置任务、可视化大屏</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>智能与自适应</h5>
                    <p class="mb-0">题目推荐、难度自适应、知识点掌握度、错题热力图</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
