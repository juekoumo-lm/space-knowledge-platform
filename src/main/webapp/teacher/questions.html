<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>题库管理 - 航天知识闯关</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #1b263b; color: #e0e1dd; }
        .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
        .table { color: #e0e1dd; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">题库管理</span>
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">可视化大屏</a>
            <a href="../login.html" class="btn btn-outline-light btn-sm" onclick="localStorage.clear()">退出</a>
        </div>
    </nav>
    <div class="container py-4">
        <div class="card p-3 mb-3">
            <div class="row g-2">
                <div class="col-auto"><select class="form-select form-select-sm" id="gradeId"><option value="">年级</option></select></div>
                <div class="col-auto"><select class="form-select form-select-sm" id="difficulty"><option value="">难度</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>
                <div class="col-auto"><input type="text" class="form-control form-control-sm" id="keyword" placeholder="关键词"></div>
                <div class="col-auto"><button class="btn btn-primary btn-sm" id="btnSearch">查询</button></div>
                <div class="col-auto"><button class="btn btn-primary btn-sm" id="btnAdd">新建题目</button></div>
            </div>
        </div>
        <div class="card p-3">
            <table class="table table-dark table-striped">
                <thead><tr><th>ID</th><th>题干</th><th>题型</th><th>难度</th><th>操作</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
            <nav><ul class="pagination pagination-sm" id="pagination"></ul></nav>
        </div>
    </div>
    
    <!-- 题目编辑模态框 -->
    <div class="modal fade" id="questionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新建题目</h5>
                    <button type="button" class="btn-close text-light" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="questionId">
                    <div class="mb-3">
                        <label class="form-label">题干</label>
                        <textarea class="form-control" id="content" rows="3" placeholder="请输入题干"></textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label">题型</label>
                            <select class="form-select" id="type">
                                <option value="SINGLE">单选题</option>
                                <option value="MULTIPLE">多选题</option>
                                <option value="JUDGE">判断题</option>
                                <option value="FILL">填空题</option>
                                <option value="SUBJECTIVE">主观题</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">难度</label>
                            <select class="form-select" id="difficultySelect">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">年级</label>
                            <select class="form-select" id="gradeIdSelect"><option value="">年级</option></select>
                        </div>
                    </div>
                    <div id="optionsContainer">
                        <div class="mb-3">
                            <label class="form-label">选项</label>
                            <div id="optionFields">
                                <div class="row g-2 mb-2 option-row">
                                    <div class="col-1">A</div>
                                    <div class="col-10"><input type="text" class="form-control option-text" placeholder="选项内容"></div>
                                    <div class="col-1"><input type="checkbox" class="form-check-input is-correct"></div>
                                </div>
                                <div class="row g-2 mb-2 option-row">
                                    <div class="col-1">B</div>
                                    <div class="col-10"><input type="text" class="form-control option-text" placeholder="选项内容"></div>
                                    <div class="col-1"><input type="checkbox" class="form-check-input is-correct"></div>
                                </div>
                                <div class="row g-2 mb-2 option-row">
                                    <div class="col-1">C</div>
                                    <div class="col-10"><input type="text" class="form-control option-text" placeholder="选项内容"></div>
                                    <div class="col-1"><input type="checkbox" class="form-check-input is-correct"></div>
                                </div>
                                <div class="row g-2 mb-2 option-row">
                                    <div class="col-1">D</div>
                                    <div class="col-10"><input type="text" class="form-control option-text" placeholder="选项内容"></div>
                                    <div class="col-1"><input type="checkbox" class="form-check-input is-correct"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">知识点ID（逗号分隔）</label>
                        <input type="text" class="form-control" id="kpIds" placeholder="例如：1,2,3">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">解析</label>
                        <textarea class="form-control" id="analysis" rows="2" placeholder="请输入解析"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="btnSave">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8081/space-knowledge/api';
        console.log('API_BASE设置为:', API_BASE);
        const token = localStorage.getItem('token');
        console.log('Token from localStorage:', token);
        if (!token) {
            console.log('No token found, redirecting to login');
            location.href = '../login.html';
        }
        function authHeaders() { 
            console.log('Creating auth headers with token:', token ? token.substring(0, 20) + '...' : 'null');
            return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; 
        }
        
        // 测试服务器连接
        function testServerConnection() {
            console.log('测试服务器连接...');
            const testUrl = API_BASE + '/grades';
            fetch(testUrl, {
                headers: authHeaders()
            })
            .then(r => {
                console.log('服务器连接测试结果:', r.status, r.statusText);
                if (r.ok) {
                    console.log('服务器连接正常');
                } else {
                    console.error('服务器连接失败:', r.status, r.statusText);
                }
            })
            .catch(error => {
                console.error('服务器连接测试失败:', error);
            });
        }
        
        // 页面加载时测试服务器连接
        testServerConnection();

        // 统一错误处理函数
        function handleError(error, message = '操作失败') {
            console.error(message, error);
            alert(message + ': ' + (error.message || '未知错误'));
        }

        // 统一API请求函数
        function apiRequest(url, options = {}) {
            console.log('API请求开始:', url);
            console.log('请求选项:', options);
            
            return fetch(url, {
                ...options,
                headers: {
                    ...authHeaders(),
                    ...options.headers
                }
            }).then(r => {
                console.log('API响应状态:', r.status, r.statusText);
                if (!r.ok) {
                    if (r.status === 401) {
                        alert('登录已过期，请重新登录');
                        localStorage.clear();
                        location.href = '../login.html';
                        throw new Error('未授权');
                    } else if (r.status === 500) {
                        // 服务器内部错误，尝试获取错误详情
                        return r.json().then(errorData => {
                            console.error('服务器错误详情:', errorData);
                            throw new Error(`服务器内部错误: ${errorData.message || '未知错误'}`);
                        }).catch(() => {
                            throw new Error(`HTTP ${r.status}: ${r.statusText}`);
                        });
                    }
                    throw new Error(`HTTP ${r.status}: ${r.statusText}`);
                }
                return r.json();
            }).then(d => {
                console.log('API响应数据:', d);
                if (d.code !== 200) {
                    throw new Error(d.message || 'API调用失败');
                }
                return d;
            }).catch(error => {
                console.error('API请求失败:', error);
                throw error;
            });
        }

        console.log('API_BASE:', API_BASE);
        console.log('Token:', token ? '存在' : '不存在');

        let page = 1, size = 20;
        fetch(API_BASE + '/grades', { headers: authHeaders() }).then(r => r.json()).then(d => {
            if (d.code === 200 && d.data) {
                const gradeSelect = document.getElementById('gradeId');
                const gradeSelectModal = document.getElementById('gradeIdSelect');
                d.data.forEach(g => {
                    gradeSelect.innerHTML += `<option value="${g.id}">${g.name}</option>`;
                    gradeSelectModal.innerHTML += `<option value="${g.id}">${g.name}</option>`;
                });
            }
        });

        function loadList() {
            const gradeId = document.getElementById('gradeId').value || null;
            const difficulty = document.getElementById('difficulty').value || null;
            const keyword = document.getElementById('keyword').value || '';
            
            let url = `${API_BASE}/teacher/questions?page=${page}&size=${size}`;
            if (gradeId) url += `&gradeId=${gradeId}`;
            if (difficulty) url += `&difficulty=${difficulty}`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            
            console.log('加载题目列表，URL:', url);
            console.log('请求头:', authHeaders());
            
            // 显示加载状态
            document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="text-center"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">加载中...</span></div> 加载中...</td></tr>';
            
            // 实际API请求
            fetch(url, {
                headers: authHeaders()
            })
            .then(r => {
                console.log('响应状态:', r.status, r.statusText);
                if (!r.ok) {
                    throw new Error(`HTTP ${r.status}: ${r.statusText}`);
                }
                return r.json();
            })
            .then(d => {
                console.log('API响应数据:', d);
                // 检查响应格式
                if (!d) {
                    throw new Error('响应数据为空');
                }
                if (d.code !== 200) {
                    throw new Error(d.message || 'API调用失败');
                }
                if (!d.data) {
                    throw new Error('响应数据格式错误');
                }
                
                const list = d.data.list || [];
                const total = d.data.total || 0;
                console.log('题目列表:', list);
                console.log('题目总数:', total);
                
                if (list.length === 0) {
                    document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="text-center">暂无数据</td></tr>';
                } else {
                    // 确保列表中的每个题目都有必要的属性
                    const validList = list.map(q => ({
                        id: q.id || '',
                        content: q.content || '',
                        type: q.type || '',
                        difficulty: q.difficulty || 0
                    }));
                    
                    document.getElementById('tbody').innerHTML = validList.map(q =>
                        `<tr><td>${q.id}</td><td>${(q.content || '').substring(0, 40)}…</td><td>${q.type}</td><td>${q.difficulty}</td><td>
                            <a href="#" class="text-warning me-2" onclick="edit(${q.id})">编辑</a>
                            <a href="#" class="text-danger" onclick="del(${q.id})">删除</a>
                        </td></tr>`
                    ).join('');
                }
            })
            .catch(error => {
                console.error('加载题目失败:', error);
                // 详细的错误处理
                let errorMessage = '加载失败，请检查网络连接';
                if (error.message.includes('500')) {
                    errorMessage = '服务器内部错误，请稍后重试';
                } else if (error.message.includes('401')) {
                    errorMessage = '登录已过期，请重新登录';
                    setTimeout(() => {
                        localStorage.clear();
                        location.href = '../login.html';
                    }, 2000);
                } else if (error.message.includes('404')) {
                    errorMessage = 'API地址不存在，请检查服务器配置';
                } else if (error.message.includes('NetworkError')) {
                    errorMessage = '网络连接失败，请检查网络设置';
                } else if (error.message.includes('响应数据为空') || error.message.includes('响应数据格式错误')) {
                    errorMessage = '服务器返回数据格式错误，请联系管理员';
                }
                document.getElementById('tbody').innerHTML = `<tr><td colspan="5" class="text-center">${errorMessage}</td></tr>`;
                alert(errorMessage);
            });
        }

        function resetForm() {
            document.getElementById('questionId').value = '';
            document.getElementById('content').value = '';
            document.getElementById('type').value = 'SINGLE';
            document.getElementById('difficultySelect').value = '1';
            document.getElementById('gradeIdSelect').value = '';
            document.getElementById('kpIds').value = '';
            document.getElementById('analysis').value = '';
            document.querySelectorAll('.option-text').forEach(input => input.value = '');
            document.querySelectorAll('.is-correct').forEach(checkbox => checkbox.checked = false);
            updateOptionsVisibility();
        }

        function updateOptionsVisibility() {
            const type = document.getElementById('type').value;
            const optionsContainer = document.getElementById('optionsContainer');
            if (type === 'FILL' || type === 'SUBJECTIVE') {
                optionsContainer.style.display = 'none';
            } else {
                optionsContainer.style.display = 'block';
            }
        }

        function edit(id) {
            const url = `${API_BASE}/teacher/questions/${id}`;
            console.log('编辑题目，URL:', url);
            
            apiRequest(url)
                .then(d => {
                    const q = d.data;
                    document.getElementById('questionId').value = q.id;
                    document.getElementById('content').value = q.content || '';
                    document.getElementById('type').value = q.type || 'SINGLE';
                    document.getElementById('difficultySelect').value = q.difficulty || 1;
                    document.getElementById('gradeIdSelect').value = q.gradeId || '';
                    document.getElementById('kpIds').value = q.kpIds ? q.kpIds.join(',') : '';
                    document.getElementById('analysis').value = q.analysis || '';
                    
                    if (q.options) {
                        const optionLabels = ['A', 'B', 'C', 'D'];
                        q.options.forEach((option, index) => {
                            if (index < 4) {
                                const optionText = document.querySelectorAll('.option-text')[index];
                                const isCorrect = document.querySelectorAll('.is-correct')[index];
                                if (optionText) optionText.value = option.optionText || '';
                                if (isCorrect) isCorrect.checked = option.isCorrect === 1;
                            }
                        });
                    }
                    
                    updateOptionsVisibility();
                    document.getElementById('modalTitle').textContent = '编辑题目';
                    new bootstrap.Modal(document.getElementById('questionModal')).show();
                })
                .catch(error => {
                    handleError(error, '获取题目详情失败');
                });
        }

        function del(id) {
            if (!confirm('确定要删除这个题目吗？')) return;
            
            const url = `${API_BASE}/teacher/questions/${id}`;
            console.log('删除题目，URL:', url);
            
            apiRequest(url, { method: 'DELETE' })
                .then(() => {
                    alert('删除成功');
                    loadList();
                })
                .catch(error => {
                    handleError(error, '删除题目失败');
                });
        }

        document.getElementById('type').onchange = updateOptionsVisibility;
        document.getElementById('btnAdd').onclick = function() {
            resetForm();
            document.getElementById('modalTitle').textContent = '新建题目';
            new bootstrap.Modal(document.getElementById('questionModal')).show();
        };
        document.getElementById('btnSave').onclick = function() {
            const id = document.getElementById('questionId').value;
            const content = document.getElementById('content').value;
            const type = document.getElementById('type').value;
            const difficulty = parseInt(document.getElementById('difficultySelect').value) || 1;
            const gradeId = document.getElementById('gradeIdSelect').value || null;
            const kpIdsStr = document.getElementById('kpIds').value;
            const analysis = document.getElementById('analysis').value;
            
            if (!content) {
                alert('请输入题干');
                return;
            }
            
            const kpIds = kpIdsStr ? kpIdsStr.split(',').map(id => parseInt(id.trim())).filter(id => !isNaN(id)) : [];
            
            let options = [];
            if (type !== 'FILL' && type !== 'SUBJECTIVE') {
                const optionTexts = document.querySelectorAll('.option-text');
                const isCorrects = document.querySelectorAll('.is-correct');
                const labels = ['A', 'B', 'C', 'D'];
                
                for (let i = 0; i < 4; i++) {
                    const text = optionTexts[i].value;
                    if (text) {
                        options.push({
                            optionLabel: labels[i],
                            optionText: text,
                            isCorrect: isCorrects[i].checked ? 1 : 0
                        });
                    }
                }
                
                if (options.length === 0) {
                    alert('请至少输入一个选项');
                    return;
                }
                
                const correctCount = options.filter(opt => opt.isCorrect === 1).length;
                if (type === 'SINGLE' && correctCount !== 1) {
                    alert('单选题必须且只能有一个正确答案');
                    return;
                }
                if (type === 'MULTIPLE' && correctCount === 0) {
                    alert('多选题至少要有一个正确答案');
                    return;
                }
                if (type === 'JUDGE' && options.length !== 2) {
                    alert('判断题必须有两个选项');
                    return;
                }
            }
            
            const question = {
                id: id ? parseInt(id) : null,
                content: content,
                type: type,
                difficulty: difficulty,
                gradeId: gradeId ? parseInt(gradeId) : null,
                kpIds: kpIds,
                analysis: analysis,
                options: options
            };
            
            const url = `${API_BASE}/teacher/questions`;
            console.log('保存题目，URL:', url);
            console.log('题目数据:', question);
            
            apiRequest(url, {
                method: 'POST',
                body: JSON.stringify(question)
            })
            .then(() => {
                alert('保存成功');
                // 修复模态框关闭问题
                const modalElement = document.getElementById('questionModal');
                const modal = bootstrap.Modal.getInstance(modalElement);
                if (modal) {
                    modal.hide();
                } else {
                    new bootstrap.Modal(modalElement).hide();
                }
                loadList();
            })
            .catch(error => {
                handleError(error, '保存题目失败');
            });
        };
        document.getElementById('btnSearch').onclick = () => {
            page = 1;
            loadList();
            // 添加查询成功提示
            setTimeout(() => {
                const tbody = document.getElementById('tbody');
                if (tbody.querySelector('tr td[colspan="5"]')) {
                    alert('查询完成，暂无数据');
                } else {
                    alert('查询完成');
                }
            }, 500);
        };

        loadList();
    </script>
</body>
</html>
